
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能并联电阻计算器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        .resistor-input-group {
            transition: all 0.3s ease;
        }
        .resistor-input-group:hover {
            transform: translateX(5px);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #888; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }
        .result-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-8">

    <div class="w-full max-w-4xl glass-panel rounded-2xl overflow-hidden flex flex-col md:flex-row shadow-2xl">
        
        <!-- Left Panel: Input & Controls -->
        <div class="w-full md:w-2/3 p-6 md:p-8 bg-white/80">
            <header class="mb-6 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-calculator text-indigo-600 mr-2"></i>并联电阻计算器</h1>
                    <p class="text-sm text-gray-500 mt-1">快速计算多个电阻并联后的等效阻值</p>
                </div>
                <button onclick="app.resetAll()" class="text-gray-400 hover:text-red-500 transition-colors" title="重置所有">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </header>

            <!-- Resistor List Container -->
            <div id="resistor-list" class="space-y-3 mb-6 max-h-[400px] overflow-y-auto pr-2">
                <!-- Dynamic Inputs will be injected here -->
            </div>

            <!-- Action Buttons -->
            <div class="flex gap-3 mb-6">
                <button onclick="app.addResistor()" class="flex-1 bg-indigo-50 text-indigo-600 py-3 rounded-xl font-semibold hover:bg-indigo-100 transition-all flex items-center justify-center gap-2 border border-indigo-200">
                    <i class="fas fa-plus"></i> 添加电阻
                </button>
                <button onclick="app.calculate()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 shadow-lg shadow-indigo-500/30 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-bolt"></i> 计算结果
                </button>
            </div>

            <!-- History Section -->
            <div class="border-t pt-4">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wider">计算历史</h3>
                    <button onclick="app.clearHistory()" class="text-xs text-gray-400 hover:text-gray-600">清空</button>
                </div>
                <ul id="history-list" class="space-y-2 text-sm text-gray-600 max-h-[150px] overflow-y-auto">
                    <li class="text-center text-gray-400 italic py-2">暂无历史记录</li>
                </ul>
            </div>
        </div>

        <!-- Right Panel: Result & Visualization -->
        <div class="w-full md:w-1/3 bg-gray-50 p-6 md:p-8 border-l border-gray-100 flex flex-col">
            <h2 class="text-lg font-bold text-gray-700 mb-4">计算结果</h2>
            
            <!-- Main Result Display -->
            <div class="result-card rounded-2xl p-6 text-white shadow-xl mb-6 relative overflow-hidden group">
                <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-white opacity-10 rounded-full blur-xl group-hover:scale-150 transition-transform duration-700"></div>
                <div class="relative z-10">
                    <p class="text-indigo-100 text-sm font-medium mb-1">总等效电阻 (Rt)</p>
                    <div class="flex items-baseline gap-1">
                        <span id="result-value" class="text-4xl font-bold tracking-tight">--</span>
                        <span id="result-unit" class="text-lg font-medium opacity-80">Ω</span>
                    </div>
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-xs text-gray-400">电阻数量</p>
                    <p id="count-display" class="text-xl font-bold text-gray-700">0</p>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-xs text-gray-400">最小电阻</p>
                    <p id="min-resistor" class="text-xl font-bold text-gray-700">--</p>
                </div>
            </div>

            <!-- Formula Reference -->
            <div class="mt-auto bg-blue-50 p-4 rounded-xl border border-blue-100">
                <h4 class="text-blue-800 font-semibold text-sm mb-2"><i class="fas fa-info-circle mr-1"></i> 计算公式</h4>
                <p class="text-blue-600 text-xs font-mono bg-white/50 p-2 rounded">
                    1/Rt = 1/R1 + 1/R2 + ... + 1/Rn
                </p>
                <p class="text-blue-400 text-[10px] mt-2">
                    * 并联总电阻小于任意一个分电阻
                </p>
            </div>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        const app = {
            resistors: [],
            history: [],
            
            init() {
                // Load from local storage if available
                const savedHistory = localStorage.getItem('resistorCalcHistory');
                if (savedHistory) {
                    this.history = JSON.parse(savedHistory);
                    this.renderHistory();
                }
                
                // Add two default inputs
                this.addResistor(1000);
                this.addResistor(1000);
                this.calculate();
            },

            addResistor(defaultValue = '') {
                const id = Date.now() + Math.random().toString(36).substr(2, 9);
                this.resistors.push({ id, value: defaultValue });
                this.renderInputs();
                // Auto calculate if all fields are filled
                if(defaultValue !== '') this.calculate();
            },

            removeResistor(id) {
                if (this.resistors.length <= 1) {
                    alert("至少需要保留一个电阻输入框");
                    return;
                }
                this.resistors = this.resistors.filter(r => r.id !== id);
                this.renderInputs();
                this.calculate();
            },

            updateValue(id, value) {
                const resistor = this.resistors.find(r => r.id === id);
                if (resistor) {
                    resistor.value = value;
                    this.calculate();
                }
            },

            renderInputs() {
                const container = document.getElementById('resistor-list');
                container.innerHTML = '';

                this.resistors.forEach((r, index) => {
                    const div = document.createElement('div');
                    div.className = 'resistor-input-group flex items-center gap-3 bg-white p-3 rounded-xl border border-gray-200 shadow-sm';
                    div.innerHTML = `
                        <div class="flex-shrink-0 w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center font-bold text-sm">
                            R${index + 1}
                        </div>
                        <div class="flex-grow relative">
                            <input type="number" 
                                value="${r.value}" 
                                oninput="app.updateValue('${r.id}', this.value)"
                                placeholder="输入阻值" 
                                class="w-full bg-transparent border-b border-gray-300 focus:border-indigo-500 outline-none py-1 text-gray-700 font-medium transition-colors"
                                step="any"
                                min="0"
                            >
                            <span class="absolute right-0 top-1 text-gray-400 text-sm">Ω</span>
                        </div>
                        <button onclick="app.removeResistor('${r.id}')" class="text-gray-300 hover:text-red-500 transition-colors p-1">
                            <i class="fas fa-times"></i>
                        </button>
                    `;
                    container.appendChild(div);
                });
                
                document.getElementById('count-display').innerText = this.resistors.length;
            },

            formatResistance(ohms) {
                if (ohms >= 1000000) {
                    return { value: (ohms / 1000000).toFixed(2), unit: 'MΩ' };
                } else if (ohms >= 1000) {
                    return { value: (ohms / 1000).toFixed(2), unit: 'kΩ' };
                }
                return { value: ohms.toFixed(2), unit: 'Ω' };
            },

            calculate() {
                const validResistors = this.resistors
                    .map(r => parseFloat(r.value))
                    .filter(v => !isNaN(v) && v > 0);

                if (validResistors.length === 0) {
                    document.getElementById('result-value').innerText = '--';
                    document.getElementById('result-unit').innerText = 'Ω';
                    document.getElementById('min-resistor').innerText = '--';
                    return;
                }

                // Calculate Parallel Resistance: 1/Rt = sum(1/Ri)
                let inverseSum = 0;
                validResistors.forEach(r => {
                    inverseSum += (1 / r);
                });
                
                const totalResistance = 1 / inverseSum;
                const formatted = this.formatResistance(totalResistance);
                
                // Update UI
                document.getElementById('result-value').innerText = formatted.value;
                document.getElementById('result-unit').innerText = formatted.unit;
                
                const minR = Math.min(...validResistors);
                const formattedMin = this.formatResistance(minR);
                document.getElementById('min-resistor').innerText = `${formattedMin.value}${formattedMin.unit}`;

                // Add to history if it's a stable calculation (debounce could be added here, but for simplicity we add on significant change or manual trigger logic could be used. Here we just update stats)
            },

            saveToHistory(totalOhms, count) {
                const formatted = this.formatResistance(totalOhms);
                const entry = {
                    date: new Date().toLocaleTimeString(),
                    result: `${formatted.value} ${formatted.unit}`,
                    count: count
                };
                
                this.history.unshift(entry);
                if (this.history.length > 10) this.history.pop();
                
                localStorage.setItem('resistorCalcHistory', JSON.stringify(this.history));
                this.renderHistory();
            },

            renderHistory() {
                const list = document.getElementById('history-list');
                if (this.history.length === 0) {
                    list.innerHTML = '<li class="text-center text-gray-400 italic py-2">暂无历史记录</li>';
                    return;
                }

                list.innerHTML = this.history.map(h => `
                    <li class="flex justify-between items-center bg-white p-2 rounded border border-gray-100 hover:bg-gray-50 transition-colors">
                        <span class="font-medium text-indigo-600">${h.result}</span>
                        <span class="text-xs text-gray-400">${h.count}个电阻 | ${h.date}</span>
                    </li>
                `).join('');
            },

            clearHistory() {
                this.history = [];
                localStorage.removeItem('resistorCalcHistory');
                this.renderHistory();
            },

            resetAll() {
                if(confirm('确定要清空所有输入吗？')) {
                    this.resistors = [];
                    this.addResistor('');
                    this.addResistor('');
                    this.calculate();
                }
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
